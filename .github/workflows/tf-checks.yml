name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
# Update 'Job name' and 'working_directory' as needed based on the module structure.
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@6f2dee689a9d21f44f1cbe66deb8f6777871ab8e
    with:
      working_directory: './examples/complete/'
      provider: none

  key-vault-with-access-policy-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@6f2dee689a9d21f44f1cbe66deb8f6777871ab8e
    with:
      working_directory: 'examples/key_vault_with_access_policy/'
      provider: none

# Seperate Job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@38cd6ebc01e8b5b14ac9a90a5579d04b02e79099
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
