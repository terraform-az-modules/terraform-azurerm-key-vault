name: tf-checks

on:
  pull_request:
  workflow_dispatch:

jobs:
# Update 'Job name' and 'working_directory' as needed based on the module structure.
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@f1ee54ff38b0eaaed9be6f5d184438c9b8a5b7eb
    with:
      working_directory: './examples/complete/'
      provider: none

  key-vault-with-access-policy-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@f1ee54ff38b0eaaed9be6f5d184438c9b8a5b7eb
    with:
      working_directory: 'examples/key_vault_with_access_policy/'
      provider: none

# Seperate Job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@v2
    secrets:
      GITHUB: ${{ secrets.GITHUB }}