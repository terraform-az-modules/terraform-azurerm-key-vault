name: Security Scan

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]

jobs:
  checkov:
    uses: clouddrove/github-shared-workflows/.github/workflows/checkov.yml@a9fc2fae0eceafcdd4a812c23a3febd9c416428b
    with:
      directory: '.'
      continue_on_error: 'true'
      skip_check: 'CKV_TF_1,CKV_TF_2,CKV2_AZURE_32,CKV_AZURE_109'